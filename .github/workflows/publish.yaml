name: Publish Chart
on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [main]
  push:
    tags: ["chart-v*.*.*"]
permissions:
  contents: write
  packages: write
concurrency:
  group: chart-publish
  cancel-in-progress: false
jobs:
  publish:
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/chart-v') ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.merged == true &&
        startsWith(github.event.pull_request.head.ref, 'chart/bump-v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && 'main' || github.ref }}
      - uses: azure/setup-helm@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - name: Validate chart
        run: |
          python scripts/check_chart.py
          helm lint charts/kubevoip
          helm template kubevoip charts/kubevoip --namespace telephony >/dev/null
      - name: Verify chart tag matches metadata
        if: startsWith(github.ref, 'refs/tags/chart-v')
        run: |
          version="$(python - <<'PY'
          import yaml
          print(yaml.safe_load(open("charts/kubevoip/Chart.yaml"))["version"])
          PY
          )"
          test "${GITHUB_REF_NAME}" = "chart-v${version}"
      - name: Prepare gh-pages worktree
        run: |
          if git ls-remote --exit-code origin refs/heads/gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add site gh-pages
          else
            mkdir site
            git -C site init -b gh-pages
            git -C site config user.name "github-actions[bot]"
            git -C site config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git -C site remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Prepare chart repository update
        id: prepare
        env:
          CHART_SIGNING_KEY: ${{ vars.CHART_SIGNING_KEY }}
          CHART_SIGNING_KEYRING_BASE64: ${{ secrets.CHART_SIGNING_KEYRING_BASE64 }}
          CHART_SIGNING_PASSPHRASE: ${{ secrets.CHART_SIGNING_PASSPHRASE }}
        run: |
          signing_args=()
          if [ -n "${CHART_SIGNING_KEY}" ] && [ -n "${CHART_SIGNING_KEYRING_BASE64}" ] && [ -n "${CHART_SIGNING_PASSPHRASE}" ]; then
            printf '%s' "${CHART_SIGNING_KEYRING_BASE64}" | base64 -d > chart-signing.gpg
            printf '%s' "${CHART_SIGNING_PASSPHRASE}" > chart-signing-passphrase.txt
            signing_args=(
              --sign
              --sign-key "${CHART_SIGNING_KEY}"
              --sign-keyring chart-signing.gpg
              --sign-passphrase-file chart-signing-passphrase.txt
            )
          fi
          set +e
          output="$(python scripts/publish_chart.py --site-dir site --dist-dir dist "${signing_args[@]}" 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if printf '%s\n' "$output" | grep -Eq 'already published with matching (digest|content); no-op'; then
            echo "publish_pages=false" >> "$GITHUB_OUTPUT"
            echo "publish_oci=true" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$output" | grep -Eq 'publishing repository metadata only'; then
            echo "publish_pages=true" >> "$GITHUB_OUTPUT"
            echo "publish_oci=false" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$output" | grep -Eq 'repository metadata changed|publishing repository metadata only'; then
            echo "publish_pages=true" >> "$GITHUB_OUTPUT"
            echo "publish_oci=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_pages=true" >> "$GITHUB_OUTPUT"
            echo "publish_oci=true" >> "$GITHUB_OUTPUT"
          fi
          exit "$status"
      - name: Commit and push gh-pages
        if: steps.prepare.outputs.publish_pages == 'true'
        run: |
          git -C site config user.name "github-actions[bot]"
          git -C site config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C site add CNAME artifacthub-repo.yml index.yaml packages
          git -C site commit -m "Publish kubevoip chart ${GITHUB_SHA}"
          git -C site push origin HEAD:gh-pages
      - name: Publish OCI chart
        if: steps.prepare.outputs.publish_oci == 'true'
        run: |
          version="$(python - <<'PY'
          import yaml
          print(yaml.safe_load(open("charts/kubevoip/Chart.yaml"))["version"])
          PY
          )"
          if helm show chart "oci://ghcr.io/kubevoip/charts/kubevoip" --version "${version}" >/dev/null 2>&1; then
            echo "OCI chart ${version} already exists; skipping"
            exit 0
          fi
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          helm push "site/packages/kubevoip-${version}.tgz" oci://ghcr.io/kubevoip/charts
        env:
          GITHUB_TOKEN: ${{ github.token }}
