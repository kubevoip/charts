name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python scripts/check_chart.py
      - run: helm lint charts/kubevoip
      - run: helm template kubevoip charts/kubevoip --namespace telephony >/dev/null
